[platformio]
default_envs = tiny, xlarge, no_emoji
extra_configs = platformio.local.ini

[crosspoint]
version = 1.3.0
crossink_version = 1.3.0
; CrumBLE's own semver, independent of upstream. Bump major on rebrand or
; upstream merges, minor on CrumBLE-only features, patch on fixes. The
; crossink_version above tracks the upstream sync point so OTA / bug
; reports can correlate against upstream releases.
;
; v2.0.0: rebranded from FlexBLE to CrumBLE. v1.x was the FlexBLE era.
; v2.1.0: Flow theme + sleep-screen cycling now default on; drawer/
;         carousel/BLE bug-fix bundle; animated Indexing popup.
; v2.1.1: fix home-screen flashing loop on unreadable collection covers.
; v2.1.2: anti-aliasing now works while a BLE remote is connected; fix the
;         long "Loading" freeze when scrolling collections of never-opened
;         books (cover thumbnails no longer trigger a full EPUB index build);
;         fix a stuck Loading popup over the carousel; carousel progress bar
;         no longer starts wide then shrinks; collections now recall their
;         shelf scroll position when you switch away and back.
; v3.0.0: rebased onto CrossInk 1.3.0 (new upstream base instead of
;         back-porting). Brings all of CrossInk 1.3's features/fixes (SD-font
;         size selection, QuickResume, Minimal sleep, OPDS low-mem, etc.) with
;         CrumBLE's features (BLE page-turner, Collections, Flow theme,
;         AA-under-BLE, sleep cycling, large-library indexing) replayed on top.
; v3.0.1: home/carousel stability + sleep fixes. Fixes a Lyra Carousel crash
;         (onEnter rendered carousel frames without the render lock, racing the
;         render task -> heap corruption -> xTaskPriorityDisinherit). Fixes a
;         carousel-only stuck placeholder cover (invalid/corrupt thumbs are now
;         revalidated + regenerated) and gives cover decode more heap headroom.
;         Adds a static "Loading" during the first carousel warmup instead of a
;         frozen-looking screen. Transparent-PNG sleep screens no longer pull
;         the last book page in as a background unless you slept from a book.
;         Also adds X4/X3 simulator envs + tooling (dev-only; X3 runtime support
;         already shipped in 3.0.0).
crumble_version = 3.4.0

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingInclude --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
; NimBLE: shrink the runtime to fit alongside WiFi + EPUB parser on ESP32-C3.
; We only ever act as central with one bonded HID remote at a time.
  -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
  -DCONFIG_BT_NIMBLE_MAX_BONDS=1
  -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL_DISABLED
  -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER_DISABLED
; EXPERIMENT (nimble-trim): shrink the host-side mbuf/ACL/HCI-event pools, which
; default to multi-connection / high-throughput sizes. A single low-rate HID
; page-turner needs a fraction of these, so the rest is reclaimable heap that the
; reader's glyph buffers need under BLE. Conservative cuts; validate BLE connects
; + stays + text renders on-device.
  -DCONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=128
  -DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=8
  -DCONFIG_BT_NIMBLE_TRANSPORT_ACL_FROM_LL_COUNT=8
  -DCONFIG_BT_NIMBLE_TRANSPORT_EVT_COUNT=12
  -DCONFIG_BT_NIMBLE_TRANSPORT_EVT_DISCARD_COUNT=4
  -DCONFIG_BT_NIMBLE_GATT_MAX_PROCS=3
# https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -std=gnu++2a
# Enable UTF-8 long file names in SdFat
  -DUSE_UTF8_LONG_NAMES=1
# Increase PNG scanline buffer to support up to 2048px wide images
# Default is (320*4+1)*2=2562, we need more for larger images
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -Wno-bidi-chars
  -Wl,--wrap=panic_print_backtrace,--wrap=panic_abort,--wrap=bootloader_common_check_efuse_blk_validity
  -fno-exceptions

build_unflags =
  -std=gnu++11
  -fexceptions

; Board configuration
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

extra_scripts =
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/patch_jpegdec.py
  pre:scripts/patch_websockets.py
  post:scripts/rename_firmware.py

; HalClockSim is the native/simulator clock backend; on-device builds use
; lib/hal/HalClock.cpp instead. Ignoring it here avoids a multiple-definition
; link error (CrossInk 1.3 added the real HalClock alongside the sim one).
lib_ignore =
  HalClockSim

; Libraries
lib_deps =
  BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
  SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ ^1.0.0
  https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b
  links2004/WebSockets @ 2.7.3
  h2zero/NimBLE-Arduino @ 2.3.6

[env:default]
extends = base
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION is set by scripts/git_branch.py (includes current branch)
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}\"
  -DCRUMBLE_VERSION=\"${crosspoint.crumble_version}\"
  -DCROSSPOINT_FIRMWARE_VARIANT=\"tiny\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2 ; Set log level to debug for development builds
  -DOMIT_XLARGE_FONT
  -DOMIT_HUGE_FONT

[env:debug]
extends = base
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION and CROSSINK_VERSION injected by scripts/git_branch.py
  ; (uses $CROSSPOINT_RC_HASH env var in CI, or git short hash locally)
  -DCROSSPOINT_FIRMWARE_VARIANT=\"tiny\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2 ; Set log level to debug for development builds
  -DOMIT_XLARGE_FONT
  -DOMIT_HUGE_FONT

[env:test]
extends = base
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION and CROSSINK_VERSION injected by scripts/git_branch.py
  ; (uses $CROSSPOINT_RC_HASH env var in CI, or git short hash locally)
  -DCROSSPOINT_FIRMWARE_VARIANT=\"tiny\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release candidate builds
  -DOMIT_XLARGE_FONT
  -DOMIT_HUGE_FONT

; Omits Extra Large (18px), Huge (20px), and Teensy (8px) font sizes. Teensy is dropped
; from the default build to make room for the BLE HID stack — re-enable it by removing
; the OMIT_TEENSY_FONT flag if you don't need Bluetooth.
[env:tiny]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}-tiny\"
  -DCRUMBLE_VERSION=\"${crosspoint.crumble_version}\"
  -DCROSSPOINT_FIRMWARE_VARIANT=\"tiny\"
  -DCROSSINK_ENABLE_LYRA_CAROUSEL=1
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1
  -DOMIT_TEENSY_FONT
  -DOMIT_ITTY_BITTY_FONT
  -DOMIT_XLARGE_FONT
  -DOMIT_HUGE_FONT

; Omits smaller font sizes (8px, 10px, and 12px) to support Extra Large/Huge and emojis.
[env:xlarge]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}-xlarge\"
  -DCRUMBLE_VERSION=\"${crosspoint.crumble_version}\"
  -DCROSSPOINT_FIRMWARE_VARIANT=\"xlarge\"
  -DENABLE_SERIAL_LOG
  -DCROSSINK_ENABLE_LYRA_CAROUSEL=1
  -DLOG_LEVEL=1
  -DOMIT_MEDIUM_FONT
  -DOMIT_TEENSY_FONT
  -DOMIT_TINY_FONT
  -DOMIT_SMALL_FONT

; All font sizes except emoji. Excludes Teensy (8px), Huge (20px), and
; — as of CrumBLE v2.1.0 — Extra Large (18px), which had to be dropped to
; fit under the app partition once the v2.1.0 feature work (BLE
; drop/reconnect, drawer/popup changes) grew the binary. Users who want
; the 18px font can use the `xlarge` variant.
[env:no_emoji]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}-no_emoji\"
  -DCRUMBLE_VERSION=\"${crosspoint.crumble_version}\"
  -DCROSSPOINT_FIRMWARE_VARIANT=\"no_emoji\"
  -DCROSSINK_ENABLE_LYRA_CAROUSEL=1
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1
  -DOMIT_TEENSY_FONT
  -DOMIT_EMOJI_FONTS
  -DOMIT_HUGE_FONT
  -DOMIT_XLARGE_FONT

; Shared simulator config. Two concrete envs extend it: `simulator` (X4,
; 800x480 — the default panel) and `simulator_x3` (X3, 792x528). Build either
; with `pio run -e simulator` / `-e simulator_x3`, or via
; scripts/run_simulator_smoke_test.py --device x4|x3.
[simulator_base]
platform = native
custom_run_simulator_target_owner = project
lib_compat_mode = off
build_src_filter =
  +<*>
  -<network/CrossPointWebServer.cpp>
  -<network/FirmwareFlasher.cpp>
  -<network/OtaBootSwitch.cpp>
  -<network/OtaUpdater.cpp>
  -<network/WebDAVHandler.cpp>
  -<platform/skip_efuse_blk_check.c>
  -<activities/settings/BluetoothSettingsActivity.cpp> ; NimBLE pairing UI — guarded out of the sim (see #ifndef SIMULATOR sites)
build_flags =
  -std=gnu++2a
  !sdl2-config --cflags --libs
  -DSIMULATOR
  -Wno-c++11-narrowing
  -DCROSSPOINT_VERSION=\"sim\"
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}\"
  -DCRUMBLE_VERSION=\"${crosspoint.crumble_version}\"
  -DCROSSPOINT_FIRMWARE_VARIANT=\"simulator\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES=1
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -DUSE_UTF8_LONG_NAMES=1
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
  -Isrc
  -Isrc/simulator/sim_stubs ; native no-op stubs for ESP32-only HAL (BluetoothHIDManager)
  ;-DOMIT_EMOJI_FONTS ; uncomment to omit emoji/symbols glyphs from reading fonts
  ;-DOMIT_TEENSY_FONT ; uncomment to omit teensy (8px) font size
  ;-DOMIT_TINY_FONT ; uncomment to omit tiny (10px) font size
  ;-DOMIT_SMALL_FONT ; uncomment to omit small (12px) font size
  ;-DOMIT_MEDIUM_FONT ; uncomment to omit medium (14px) font size
  ;-DOMIT_XLARGE_FONT ; uncomment to omit extra large (18px) font size
  ;-DOMIT_HUGE_FONT ; uncomment to omit huge (20px) font size
  -DCROSSPOINT_SIM_USE_NATIVE_DECODERS
  -Dmemcpy_P=memcpy ; For native JPEGDEC
lib_ignore = hal, WebSockets
extra_scripts =
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/build_html.py
  post:.pio/libdeps/$PIOENV/simulator/run_simulator_project.py
lib_deps =
  simulator=https://github.com/uxjulia/crosspoint-simulator
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ ^0.0.1
  bitbank2/PNGdec @ ^1.0.0
  https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b
  links2004/WebSockets @ 2.7.3

; X4 panel (800x480) — the default simulator target. No device flag needed;
; the simulator package defaults to the X4 framebuffer shape.
[env:simulator]
extends = simulator_base

; X3 panel (792x528). -DSIMULATOR_DEVICE_X3 switches the simulator framebuffer
; to 792x528, makes gpio.deviceIsX3() report true, and exposes the tilt sensor.
[env:simulator_x3]
extends = simulator_base
build_flags =
  ${simulator_base.build_flags}
  -DSIMULATOR_DEVICE_X3
